name: Build and Publish Container to Docker Hub

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to build/publish'
        required: true
        default: '0.1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Build and Publish Container Image
        run: |
          # Determine the tag from input, release event, or pushed tag ref
          INPUT_TAG="${{ github.event.inputs.tag_name }}"
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          REF_TAG="${{ github.ref_name }}"
          TAG_NAME="${INPUT_TAG:-${RELEASE_TAG:-${REF_TAG}}}"
          # Strip 'v' prefix to get a clean semver (e.g. v0.1 → 0.1)
          VERSION_TAG="${TAG_NAME#v}"
          TAG_NAME=$(echo "$TAG_NAME" | tr -d '\r')
          VERSION_TAG=$(echo "$VERSION_TAG" | tr -d '\r')
          echo "Building for tag: ${TAG_NAME} (version: ${VERSION_TAG})"

          # Build the container image and write it to a local tar archive.
          # ContainerArchiveOutputPath bypasses the SDK's push path entirely,
          # which avoids the broken ContainerImageTags validation
          # (dotnet/sdk-container-builds#236, #311, #601).
          dotnet publish src/KanbanDmz.Web/KanbanDmz.Web.csproj \
            -c Release \
            -t:PublishContainer \
            -p:ContainerImageName=kanban-dmz-web \
            -p:ContainerImageTag=ci-build \
            -p:ContainerArchiveOutputPath=/tmp/kanban-dmz-web.tar

          # Load the tar into the local Docker daemon, then tag and push
          docker load --input /tmp/kanban-dmz-web.tar

          docker tag kanban-dmz-web:ci-build fboucher/kanban-dmz-web:${VERSION_TAG}
          docker tag kanban-dmz-web:ci-build fboucher/kanban-dmz-web:latest
          docker push fboucher/kanban-dmz-web:${VERSION_TAG}
          docker push fboucher/kanban-dmz-web:latest

          # Also push the v-prefixed tag if the original tag had one (e.g. v0.1)
          if [ "${TAG_NAME}" != "${VERSION_TAG}" ]; then
            docker tag kanban-dmz-web:ci-build fboucher/kanban-dmz-web:${TAG_NAME}
            docker push fboucher/kanban-dmz-web:${TAG_NAME}
          fi
