name: Build and Publish Container to Docker Hub

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to build/publish'
        required: true
        default: '0.1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Build and Publish Container Image
        run: |
          # Get the tag name from input, release event, or ref_name
          INPUT_TAG="${{ github.event.inputs.tag_name }}"
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          REF_TAG="${{ github.ref_name }}"
          
          TAG_NAME="${INPUT_TAG:-${RELEASE_TAG:-${REF_TAG}}}"
          # Strip 'v' prefix if it exists to get clean version number (e.g. 0.1.0)
          VERSION_TAG="${TAG_NAME#v}"
          
          echo "Building and publishing for tag: ${TAG_NAME} (version tag: ${VERSION_TAG})"
          
          # Build and load into local Docker daemon
          dotnet publish src/KanbanDmz.Web/KanbanDmz.Web.csproj -c Release -t:PublishContainer -p:ContainerImageTags="\"latest;${VERSION_TAG};${TAG_NAME}\""
          
          # Push to Docker Hub
          docker push fboucher/kanban-dmz-web:latest
          docker push fboucher/kanban-dmz-web:${VERSION_TAG}
          docker push fboucher/kanban-dmz-web:${TAG_NAME}
