name: Build and Publish Container to Docker Hub

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to build/publish'
        required: true
        default: '0.1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Build and Publish Container Image
        run: |
          # Get the tag name from input, release event, or ref_name
          INPUT_TAG="${{ github.event.inputs.tag_name }}"
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          REF_TAG="${{ github.ref_name }}"
          
          TAG_NAME="${INPUT_TAG:-${RELEASE_TAG:-${REF_TAG}}}"
          # Strip 'v' prefix if it exists to get clean version number (e.g. 0.1.0)
          VERSION_TAG="${TAG_NAME#v}"
          
          # Clean carriage returns (in case workflow is run with CRLF line endings)
          TAG_NAME=$(echo "$TAG_NAME" | tr -d '\r')
          VERSION_TAG=$(echo "$VERSION_TAG" | tr -d '\r')
          
          echo "Building and publishing for tag: ${TAG_NAME} (version tag: ${VERSION_TAG})"
          
          # Build and publish — only pass tags valid for ContainerImageTags
          # (alphanumeric, underscore, hyphen, period — no 'v' prefix allowed by MSBuild targets)
          dotnet publish src/KanbanDmz.Web/KanbanDmz.Web.csproj -c Release -t:PublishContainer -p:ContainerImageTags="\"latest;${VERSION_TAG}\""
          
          # Push numeric/latest tags (already built above)
          docker push fboucher/kanban-dmz-web:latest
          docker push fboucher/kanban-dmz-web:${VERSION_TAG}
          
          # If the original tag had a 'v' prefix, also tag and push that variant
          if [ "${TAG_NAME}" != "${VERSION_TAG}" ]; then
            docker tag fboucher/kanban-dmz-web:${VERSION_TAG} fboucher/kanban-dmz-web:${TAG_NAME}
            docker push fboucher/kanban-dmz-web:${TAG_NAME}
          fi
